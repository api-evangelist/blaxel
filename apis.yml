aid: blaxel
url: https://raw.githubusercontent.com/api-evangelist/blaxel/refs/heads/main/apis.yml
name: Blaxel
kind: company
description: Blaxel (formerly Beamlit) is an infrastructure and compute platform built
  for AI agents. Its control plane API deploys and manages agents, MCP/function servers,
  serverless code sandboxes, batch jobs, a multi-provider model gateway, deployment
  policies, integrations, and multi-tenant workspaces. The REST control plane lives
  at api.blaxel.ai/v0 and authenticates with a Bearer API key or OAuth 2.0.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- Agents
- Infrastructure
- Sandboxes
- MCP
- Compute
- Serverless
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
